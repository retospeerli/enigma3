<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Enigma Bedienmaschine</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="app">
  <header class="topbar">
    <div>
      <h1>Enigma I</h1>
      <p>Historisch nachempfundene Bedienmaschine mit Rotorwahl und Steckerbrett</p>
    </div>

    <button id="resetBtn" class="small">↻ Zurücksetzen</button>
  </header>

  <section class="machine">
    <div class="wood-case">
      <div class="metal-face">

        <section class="top-machine-panel">
          <div class="left-plate">
            <div class="hinge"></div>
          </div>

          <div class="logo">ENIGMA</div>

          <section class="rotor-panel">
            <div class="rotor-unit">
              <label for="leftRotorSelect">Walze links</label>
              <select id="leftRotorSelect"></select>
              <button class="rotor-window" id="leftWindow">A</button>
            </div>

            <div class="rotor-unit">
              <label for="middleRotorSelect">Walze Mitte</label>
              <select id="middleRotorSelect"></select>
              <button class="rotor-window" id="middleWindow">A</button>
            </div>

            <div class="rotor-unit">
              <label for="rightRotorSelect">Walze rechts</label>
              <select id="rightRotorSelect"></select>
              <button class="rotor-window" id="rightWindow">A</button>
            </div>

            <div class="rotor-unit reflector-unit">
              <label>Umkehrwalze</label>
              <button class="reflector-window" id="reflectorWindow">UKW B</button>
            </div>
          </section>

          <div class="note-plate">
            Zum Betrieb<br>
            Walzen wählen<br>
            Startstellung<br>
            einstellen
          </div>

          <div class="screws">
            <span></span><span></span>
            <span></span><span></span>
          </div>
        </section>

        <section class="lampboard" id="lampboard"></section>

        <section class="keyboard" id="keyboard"></section>

        <section class="plugboard-wrap">
          <div class="plugboard-head">
            <h2>Steckerbrett</h2>
            <p><span id="plugCount">0</span>/10 Verbindungen</p>
          </div>

          <svg id="plugSvg" class="plug-svg"></svg>
          <section class="plugboard" id="plugboard"></section>
        </section>

      </div>
    </div>
  </section>

  <section class="controls">
    <section class="box">
      <label for="inputText">Text vorbereiten</label>
      <textarea id="inputText" spellcheck="false" placeholder="Text hier fertig eintippen..."></textarea>
      <button id="playTextBtn">▶ Nachricht senden</button>
    </section>

    <section class="box">
      <label for="outputText">Ausgabe</label>
      <textarea id="outputText" spellcheck="false" readonly></textarea>
      <button id="clearBtn" class="secondary">Ausgabe löschen</button>
    </section>
  </section>

</main>

<script src="app.js"></script>
</body>
</html>
